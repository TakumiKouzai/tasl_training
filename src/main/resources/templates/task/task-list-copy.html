<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク管理アプリ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS CDN -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="app-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1 app-title">タスク管理アプリ</h1>
            <p class="text-muted mb-0">日々のタスクを一覧で管理します。</p>
        </div>

        <button type="button"
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#createTaskModal">
           新規登録
        </button>
    </div>

    <div class="card shadow-sm task-card">
        <div class="card-header bg-white">
            <strong>タスク一覧</strong>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 task-table">
                    <thead class="table-light">
                    <tr>
                        <th style="width: 8%;">ID</th>
                        <th style="width: 30%;">タスク名</th>
                        <th style="width: 16%;">優先度</th>
                        <th style="width: 18%;">ステータス</th>
                        <th style="width: 28%;" class="text-center">操作</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:if="${#lists.isEmpty(tasks)}">
                        <td colspan="5" class="text-center text-muted py-4">
                            登録されているタスクはありません。
                        </td>
                    </tr>

                    <tr th:each="task : ${tasks}">
                        <td th:text="${task.id}">1</td>

                        <td>
                            <span class="fw-semibold task-title" th:text="${task.title}">
                                タスク名
                            </span>
                            <div class="small text-muted" th:text="${task.description}">
                                タスク説明
                            </div>
                        </td>

                        <td>
                            <span th:if="${task.priority == 'A'}"
                                  class="badge text-bg-danger">
                                A：高
                            </span>

                            <span th:if="${task.priority == 'B'}"
                                  class="badge text-bg-warning">
                                B：中
                            </span>

                            <span th:if="${task.priority == 'C'}"
                                  class="badge text-bg-secondary">
                                C：低
                            </span>
                        </td>

                        <td>
                            <span th:if="${task.status == '未着手'}"
                                  class="badge text-bg-secondary">
                                未着手
                            </span>

                            <span th:if="${task.status == '進行中'}"
                                  class="badge text-bg-primary">
                                進行中
                            </span>

                            <span th:if="${task.status == '完了'}"
                                  class="badge text-bg-success">
                                完了
                            </span>
                        </td>

                        <td class="text-center">
                            <button type="button"
                                    class="btn btn-sm btn-outline-info"
                                    data-bs-toggle="modal"
                                    th:attr="data-bs-target='#detailTaskModal-' + ${task.id}">
                                詳細
                            </button>

                            <button type="button"
                                    class="btn btn-sm btn-outline-primary"
                                    data-bs-toggle="modal"
                                    th:attr="data-bs-target='#editTaskModal-' + ${task.id}">
                                編集
                            </button>

                            <form th:action="@{/tasks/{taskId}/delete(taskId=${task.id})}"
                                  method="post"
                                  class="d-inline">
                                <button type="submit"
                                        class="btn btn-sm btn-outline-danger"
                                        data-task-title="${task.title}">
                                    削除
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/h2-console}" target="_blank" class="btn btn-outline-secondary btn-sm">
            H2 Consoleを開く
        </a>
    </div>

    <!-- 新規登録モーダル -->
    <div class="modal fade"
         id="createTaskModal"
         tabindex="-1"
         aria-labelledby="createTaskModalLabel"
         aria-hidden="true">

        <div class="modal-dialog">
            <div class="modal-content">

                <form th:action="@{/tasks/new}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" id="createTaskModalLabel">タスク新規登録</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
                    </div>

                    <div class="modal-body">
                        <!-- 以下、既存の作成フォーム内容（そのまま残す） -->
                        <div class="mb-3">
                            <label for="createTitle" class="form-label">
                                タスク名 <span class="text-danger">*</span>
                            </label>
                            <input type="text"
                                   class="form-control"
                                   id="createTitle"
                                   name="title"
                                   maxlength="100"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label for="createDescription" class="form-label">
                                タスク説明
                            </label>
                            <textarea class="form-control"
                                      id="createDescription"
                                      name="description"
                                      rows="4"
                                      maxlength="1000"></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="createPriority" class="form-label">
                                優先度 <span class="text-danger">*</span>
                            </label>
                            <select class="form-select"
                                    id="createPriority"
                                    name="priority"
                                    required>
                                <option value="">選択してください</option>
                                <option value="A">A：高</option>
                                <option value="B">B：中</option>
                                <option value="C">C：低</option>
                            </select>
                        </div>

                        <div class="alert alert-info mb-0">
                            登録時のステータスは自動的に「未着手」になります。
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal">
                            閉じる
                        </button>

                        <button type="submit" class="btn btn-primary">
                            登録
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 詳細表示モーダル -->
    <div th:each="task : ${tasks}"
         class="modal fade"
         th:id="'detailTaskModal-' + ${task.id}"
         tabindex="-1"
         th:aria-labelledby="'detailTaskModalLabel-' + ${task.id}"
         aria-hidden="true">

        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <div class="modal-header bg-info-subtle">
                    <h5 class="modal-title"
                        th:id="'detailTaskModalLabel-' + ${task.id}">
                        タスク詳細
                    </h5>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                            aria-label="閉じる">
                    </button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label fw-bold">ID</label>
                        <div class="form-control-plaintext"
                             th:text="${task.id}">
                            1
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">タスク名</label>
                        <div class="form-control-plaintext"
                             th:text="${task.title}">
                            タスク名
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">タスク説明</label>
                        <div class="border rounded bg-light p-3"
                             style="white-space: pre-wrap;"
                             th:text="${task.description}">
                            タスク説明
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">優先度</label>
                            <div>
                                <span th:if="${task.priority == 'A'}"
                                          class="badge text-bg-danger">
                                    A：高
                                </span>

                                <span th:if="${task.priority == 'B'}"
                                          class="badge text-bg-warning">
                                    B：中
                                </span>

                                <span th:if="${task.priority == 'C'}"
                                          class="badge text-bg-secondary">
                                    C：低
                                </span>
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">ステータス</label>
                            <div>
                                <span th:if="${task.status == '未着手'}"
                                          class="badge text-bg-secondary">
                                    未着手
                                </span>

                                <span th:if="${task.status == '進行中'}"
                                          class="badge text-bg-primary">
                                    進行中
                                </span>

                                <span th:if="${task.status == '完了'}"
                                          class="badge text-bg-success">
                                    完了
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">作成日時</label>
                            <div class="form-control-plaintext"
                                 th:text="${#temporals.format(task.createdAt, 'yyyy/MM/dd HH:mm:ss')}">
                                2026/06/15 10:00:00
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">更新日時</label>
                            <div class="form-control-plaintext"
                                 th:text="${#temporals.format(task.updatedAt, 'yyyy/MM/dd HH:mm:ss')}">
                                2026/06/15 10:00:00
                            </div>
                        </div>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        閉じる
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- 編集モーダル -->
    <div th:each="task : ${tasks}"
         class="modal fade"
         th:id="'editTaskModal-' + ${task.id}"
         tabindex="-1"
         th:aria-labelledby="'editTaskModalLabel-' + ${task.id}"
         aria-hidden="true">

        <div class="modal-dialog">
            <div class="modal-content">

                <form th:action="@{/tasks/{taskId}/edit(taskId=${task.id})}" method="post">
                    <div class="modal-header bg-primary-subtle">
                        <h5 class="modal-title" th:id="'editTaskModalLabel-' + ${task.id}">タスク編集</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
                    </div>

                    <div class="modal-body">
                        <!-- 以下、既存の編集フォーム内容（そのまま残す） -->
                        <div class="mb-3">
                            <label th:for="'editTitle-' + ${task.id}" class="form-label">
                                タスク名 <span class="text-danger">*</span>
                            </label>
                            <input type="text"
                                   class="form-control"
                                   th:id="'editTitle-' + ${task.id}"
                                   name="title"
                                   th:value="${task.title}"
                                   maxlength="100"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label th:for="'editDescription-' + ${task.id}" class="form-label">
                                タスク説明
                            </label>
                            <textarea class="form-control"
                                      th:id="'editDescription-' + ${task.id}"
                                      name="description"
                                      rows="4"
                                      maxlength="1000"
                                      th:text="${task.description}"></textarea>
                        </div>

                        <div class="mb-3">
                            <label th:for="'editPriority-' + ${task.id}" class="form-label">
                                優先度 <span class="text-danger">*</span>
                            </label>
                            <select class="form-select"
                                    th:id="'editPriority-' + ${task.id}"
                                    name="priority"
                                    required>
                                <option value="A" th:selected="${task.priority == 'A'}">A：高</option>
                                <option value="B" th:selected="${task.priority == 'B'}">B：中</option>
                                <option value="C" th:selected="${task.priority == 'C'}">C：低</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label th:for="'editStatus-' + ${task.id}" class="form-label">
                                ステータス <span class="text-danger">*</span>
                            </label>
                            <select class="form-select"
                                    th:id="'editStatus-' + ${task.id}"
                                    name="status"
                                    required>
                                <option value="未着手" th:selected="${task.status == '未着手'}">未着手</option>
                                <option value="進行中" th:selected="${task.status == '進行中'}">進行中</option>
                                <option value="完了" th:selected="${task.status == '完了'}">完了</option>
                            </select>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal">
                            閉じる
                        </button>

                        <button type="submit" class="btn btn-primary">
                            更新
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/script.js}"></script>

</body>
</html>
