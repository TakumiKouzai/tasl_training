<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>タスク作成/編集</title></head>
<body>
  <h1 th:text="${task.id} != null ? 'タスク編集' : 'タスク作成'">タスク作成</h1>
  <form th:action="${task.id} != null ? @{'/tasks/' + ${task.id}} : @{/tasks}" method="post" th:object="${task}">
    <div>
      <label>タスク名: <input type="text" th:field="*{title}"/></label>
      <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color:red"></div>
    </div>
    <div>
      <label>優先度:
        <select th:field="*{priority}">
          <option value="A">A（高）</option>
          <option value="B">B（中）</option>
          <option value="C">C（低）</option>
        </select>
      </label>
      <div th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}" style="color:red"></div>
    </div>
    <div>
      <label>ステータス:
        <select th:field="*{status}">
          <option>未着手</option>
          <option>進行中</option>
          <option>完了</option>
        </select>
      </label>
      <div th:if="${#fields.hasErrors('status')}" th:errors="*{status}" style="color:red"></div>
    </div>
    <div>
      <label>説明:<br/>
        <textarea th:field="*{description}" rows="6" cols="60"></textarea>
      </label>
      <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" style="color:red"></div>
    </div>
    <div>
      <button type="submit">保存</button>
      <a href="/tasks">キャンセル</a>
    </div>
  </form>
</body>
</html>
